name: Build and Release Desk Pet Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: desk_pet_linux
            hidden_import: bleak.backends.bluezdbus
          - os: windows-latest
            artifact_name: desk_pet_windows.exe
            hidden_import: bleak.backends.winrt
          - os: macos-latest
            artifact_name: desk_pet_macos
            hidden_import: bleak.backends.corebluetooth

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller rich bleak mido

      - name: Build with PyInstaller
        shell: bash
        run: |
          # Build executable
          pyinstaller --onefile --hidden-import=${{ matrix.hidden_import }} --name=${{ matrix.artifact_name }} desk_pet.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-executable
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Organize assets
        run: |
          mkdir release-dist
          find dist-artifacts -type f -exec cp {} release-dist/ \;
          ls -la release-dist

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: release-dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
